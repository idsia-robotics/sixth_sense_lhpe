model_nickname: true

history_parameters:
  length: 30
  stride: 1

fcn_configs:
  layer_configs:
  - dilation: 1
    kernel_size: 3
    out_channels: 32
    use_group_norm: true
  - dilation: 1
    kernel_size: 3
    out_channels: 32
    use_group_norm: true
  - dilation: 1
    kernel_size: 3
    out_channels: 32
    use_group_norm: true
  - dilation: 2
    kernel_size: 3
    out_channels: 32
    use_group_norm: true
  - dilation: 2
    kernel_size: 5
    out_channels: 32
    use_group_norm: true
  - dilation: 2
    kernel_size: 7
    out_channels: 32
    use_group_norm: true
  - dilation: 2
    kernel_size: 7
    out_channels: 32
    use_group_norm: true
  use_skip_connection: true

train_configs:
  batch_size: 64
  num_epochs: 10
  learning_rate: 0.001
  augmentations: true
  dummy_model: false
  dummy_type: "random" # "zero", "average", "random"
  loss_function:
    presence: true
    distance: true
    orientation: true
    bidirection: false
    verse: false

